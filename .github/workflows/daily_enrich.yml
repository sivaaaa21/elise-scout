name: Daily Lead Enrichment

# 9am ET weekdays. Manual trigger available from the Actions tab.
on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional: process only the first N leads"
        required: false
        default: ""

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run enricher
        env:
          CENSUS_API_KEY:           ${{ secrets.CENSUS_API_KEY }}
          NEWSAPI_KEY:              ${{ secrets.NEWSAPI_KEY }}
          OPENWEATHER_API_KEY:      ${{ secrets.OPENWEATHER_API_KEY }}
          EMAIL_LLM_PROVIDER:       ${{ secrets.EMAIL_LLM_PROVIDER }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_ID:         ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_INPUT_TAB:  Leads
          GOOGLE_SHEETS_OUTPUT_TAB: Enriched
          GOOGLE_APPLICATION_CREDENTIALS: ./gcp-sa.json
        run: |
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}" > gcp-sa.json
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python -m src.enricher --source sheets --sink sheets --limit ${{ github.event.inputs.limit }}
          else
            python -m src.enricher --source sheets --sink sheets
          fi

      - name: Upload enriched CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enriched-leads-${{ github.run_id }}
          path: output/enriched_leads.csv
          if-no-files-found: ignore
